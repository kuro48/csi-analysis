[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# カバレッジ設定
addopts =
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
    -v
    --strict-markers

# マーカー定義
markers =
    unit: ユニットテスト
    integration: 統合テスト
    e2e: エンドツーエンドテスト
    slow: 実行時間が長いテスト
