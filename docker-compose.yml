services:
  postgres:
    image: postgres:15-alpine
    container_name: csi_postgres
    environment:
      POSTGRES_USER: csi_user
      POSTGRES_PASSWORD: csi_password
      POSTGRES_DB: csi_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csi_user -d csi_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - csi_network

  redis:
    image: redis:7-alpine
    container_name: csi_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - csi_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: csi_backend
    environment:
      - DATABASE_URL=postgresql://csi_user:csi_password@postgres:5432/csi_system
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_HOST=postgres
      - POSTGRES_USER=csi_user
      - POSTGRES_PASSWORD=csi_password
      - POSTGRES_DB=csi_system
      - REDIS_HOST=redis
      - JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
      - ALLOWED_ORIGINS=http://localhost,http://127.0.0.1,http://localhost:3000,https://api.csi.kur048.com
      - DEBUG=True
      - ZKP_AUTO_COMPILE=TRUE
      - PICOSCENES_PARSER=python
      - MATLAB_COMMAND=matlab
      - PICOSCENES_MATLAB_TOOLBOX_PATH=
      - PICOSCENES_MATLAB_TIMEOUT_SECONDS=300
      - ETHEREUM_RPC_URL=http://ganache:8545
      - ZKPROOF_STORE_FULL_DATA_ONCHAIN=false
      - ZKPROOF_ONCHAIN_MAX_JSON_CHARS=2048
    volumes:
      - ./backend:/app
      - ./zkp:/zkp
      - csi_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - csi_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.csi.kur048.com
    container_name: csi_frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - csi_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: csi_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - csi_network
    restart: unless-stopped

  ganache:
    build:
      context: ./ganache
      dockerfile: Dockerfile
    container_name: csi_ganache
    command: [
      "ganache",
      "--host",
      "0.0.0.0",
      "--port",
      "8545",
      "--database.dbPath",
      "/data/ganache",
      "--wallet.defaultBalance",
      "1000",
      "--wallet.deterministic",
      "--chain.allowUnlimitedInitCodeSize",
      "--chain.allowUnlimitedContractSize",
      "--miner.blockGasLimit",
      "0x40000000"
    ]
    volumes:
      - ganache_data:/data
    ports:
      - "8545:8545"
    networks:
      - csi_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  csi_uploads:
    driver: local
  ganache_data:
    driver: local

networks:
  csi_network:
    driver: bridge
