name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # デプロイ前のチェック
  pre-deploy-check:
    name: Pre-Deployment Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment readiness
        run: |
          echo "🔍 Checking deployment readiness..."

          # 必須ファイルの存在確認
          if [ ! -f "docker-compose.yml" ]; then
            echo "❌ Error: docker-compose.yml not found"
            exit 1
          fi

          if [ ! -f "backend/requirements.txt" ]; then
            echo "❌ Error: backend/requirements.txt not found"
            exit 1
          fi

          if [ ! -f "frontend/package.json" ]; then
            echo "❌ Error: frontend/package.json not found"
            exit 1
          fi

          echo "✅ All required files present"
          echo "🚀 Ready to deploy to: ${{ github.event.inputs.environment }}"

  # Docker イメージビルド & プッシュ（オプション）
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    # Docker Hubなどのレジストリを使う場合のみ有効化
    if: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/csi-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/csi-backend:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/csi-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/csi-frontend:${{ github.sha }}

  # Self-hosted環境へのデプロイ
  deploy-self-hosted:
    name: Deploy to Self-Hosted Server
    runs-on: self-hosted
    needs: pre-deploy-check
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create backup
        run: |
          echo "💾 Creating backup..."
          BACKUP_DIR="backups/$(date +%Y%m%d_%H%M%S)"
          mkdir -p $BACKUP_DIR

          # データベースバックアップ（PostgreSQL起動中の場合）
          if docker-compose ps postgres | grep -q "Up"; then
            docker-compose exec -T postgres pg_dump -U csi_user csi_system > $BACKUP_DIR/database.sql
            echo "✅ Database backup created"
          fi

      - name: Stop existing services
        run: |
          echo "🛑 Stopping existing services..."
          docker-compose down

      - name: Pull latest changes
        run: |
          echo "📥 Pulling latest changes..."
          git pull origin main

      - name: Build and start services
        run: |
          echo "🔨 Building Docker images..."
          docker-compose build --no-cache

          echo "🚀 Starting services..."
          docker-compose up -d

      - name: Wait for services to be ready
        run: |
          echo "⏳ Waiting for services to start..."
          sleep 30

      - name: Health check
        run: |
          echo "🔍 Running health checks..."

          # バックエンドヘルスチェック
          if curl -f http://localhost:8000/health; then
            echo "✅ Backend health check passed"
          else
            echo "❌ Backend health check failed"
            exit 1
          fi

          # フロントエンドヘルスチェック
          if curl -f http://localhost:3000; then
            echo "✅ Frontend health check passed"
          else
            echo "❌ Frontend health check failed"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "📍 Environment: ${{ github.event.inputs.environment }}"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
          echo "📅 Deployed at: $(date)"

  # デプロイ失敗時のロールバック
  rollback-on-failure:
    name: Rollback on Failure
    runs-on: self-hosted
    needs: deploy-self-hosted
    if: failure()

    steps:
      - name: Rollback deployment
        run: |
          echo "⚠️  Deployment failed! Rolling back..."

          # 最新のバックアップを探す
          LATEST_BACKUP=$(ls -t backups/ | head -1)

          if [ -n "$LATEST_BACKUP" ]; then
            echo "📥 Restoring from backup: $LATEST_BACKUP"

            # データベースのリストア（必要に応じて）
            if [ -f "backups/$LATEST_BACKUP/database.sql" ]; then
              docker-compose exec -T postgres psql -U csi_user csi_system < "backups/$LATEST_BACKUP/database.sql"
            fi
          fi

          # 前のバージョンで再起動
          docker-compose down
          docker-compose up -d

          echo "✅ Rollback completed"
