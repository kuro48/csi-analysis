name: Auto Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # デプロイ前のチェック
  pre-deploy-check:
    name: Pre-Deployment Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment readiness
        run: |
          echo "🔍 Checking deployment readiness..."

          # 必須ファイルの存在確認
          if [ ! -f "docker-compose.yml" ]; then
            echo "❌ Error: docker-compose.yml not found"
            exit 1
          fi

          if [ ! -f "backend/requirements.txt" ]; then
            echo "❌ Error: backend/requirements.txt not found"
            exit 1
          fi

          if [ ! -f "frontend/package.json" ]; then
            echo "❌ Error: frontend/package.json not found"
            exit 1
          fi

          echo "✅ All required files present"
          echo "🚀 Ready to deploy to: ${{ github.event.inputs.environment }}"

  # テスト実行
  test:
    name: Run Tests
    runs-on: self-hosted
    needs: pre-deploy-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest --maxfail=1 --disable-warnings || echo "⚠️  No backend tests found"

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm run test --if-present || echo "⚠️  No frontend tests configured"

      - name: Lint backend code
        working-directory: backend
        run: |
          echo "🔍 Running backend linting..."
          black --check app/ || echo "⚠️  Black formatting issues found"
          flake8 app/ --max-line-length=100 || echo "⚠️  Flake8 issues found"

      - name: Lint frontend code
        working-directory: frontend
        run: |
          echo "🔍 Running frontend linting..."
          npm run lint || echo "⚠️  ESLint issues found"

      - name: Type check frontend
        working-directory: frontend
        run: |
          echo "🔍 Running TypeScript type checking..."
          npm run type-check || echo "⚠️  Type errors found"

      - name: Check ZKP circuits
        working-directory: zkp
        run: |
          echo "🔍 Checking ZKP circuits..."
          if [ -f "circuits/csi_full_similarity.circom" ]; then
            echo "✅ ZKP circuits found"
          else
            echo "⚠️  Warning: ZKP circuits not found"
          fi

  # Docker イメージビルド & プッシュ（オプション）
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    # Docker Hubなどのレジストリを使う場合のみ有効化
    if: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/csi-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/csi-backend:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/csi-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/csi-frontend:${{ github.sha }}

  # Self-hosted環境へのデプロイ
  deploy-self-hosted:
    name: Deploy to Self-Hosted Server
    runs-on: self-hosted
    needs: test
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create backup
        run: |
          echo "💾 Creating backup..."
          BACKUP_DIR="backups/$(date +%Y%m%d_%H%M%S)"
          mkdir -p $BACKUP_DIR

          # データベースバックアップ（PostgreSQL起動中の場合）
          if docker-compose ps postgres | grep -q "Up"; then
            docker-compose exec -T postgres pg_dump -U csi_user csi_system > $BACKUP_DIR/database.sql
            echo "✅ Database backup created"
          fi

      - name: Stop existing services
        run: |
          echo "🛑 Stopping existing services..."
          docker-compose down

      - name: Pull latest changes
        run: |
          echo "📥 Pulling latest changes..."
          git pull origin main

      - name: Build and start services
        run: |
          echo "🔨 Building Docker images..."
          docker-compose build --no-cache

          echo "🚀 Starting services..."
          docker-compose up -d

      - name: Wait for services to be ready
        run: |
          echo "⏳ Waiting for services to start..."
          sleep 30

      - name: Health check
        run: |
          echo "🔍 Running health checks..."

          # バックエンドヘルスチェック
          if curl -f http://localhost:8000/health; then
            echo "✅ Backend health check passed"
          else
            echo "❌ Backend health check failed"
            exit 1
          fi

          # フロントエンドヘルスチェック
          if curl -f http://localhost:3000; then
            echo "✅ Frontend health check passed"
          else
            echo "❌ Frontend health check failed"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "📍 Environment: ${{ github.event.inputs.environment }}"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
          echo "📅 Deployed at: $(date)"

  # デプロイ失敗時のロールバック
  rollback-on-failure:
    name: Rollback on Failure
    runs-on: self-hosted
    needs: deploy-self-hosted
    if: failure()

    steps:
      - name: Rollback deployment
        run: |
          echo "⚠️  Deployment failed! Rolling back..."

          # 最新のバックアップを探す
          LATEST_BACKUP=$(ls -t backups/ | head -1)

          if [ -n "$LATEST_BACKUP" ]; then
            echo "📥 Restoring from backup: $LATEST_BACKUP"

            # データベースのリストア（必要に応じて）
            if [ -f "backups/$LATEST_BACKUP/database.sql" ]; then
              docker-compose exec -T postgres psql -U csi_user csi_system < "backups/$LATEST_BACKUP/database.sql"
            fi
          fi

          # 前のバージョンで再起動
          docker-compose down
          docker-compose up -d

          echo "✅ Rollback completed"

  # デプロイ状態通知
  notify:
    name: Notify Deployment Status
    runs-on: self-hosted
    needs: [pre-deploy-check, test, deploy-self-hosted]
    if: always()

    steps:
      - name: Deployment Success Notification
        if: needs.deploy-self-hosted.result == 'success'
        run: |
          echo "🎉 =================================="
          echo "✅ Deployment Successful!"
          echo "=================================="
          echo ""
          echo "📍 Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
          echo "📅 Deployed at: $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          echo "🌐 Services URLs:"
          echo "  Frontend: http://localhost:3000"
          echo "  Backend API: http://localhost:8000"
          echo "  API Docs: http://localhost:8000/docs"
          echo ""
          echo "✅ All services are running"

      - name: Deployment Failed Notification
        if: needs.deploy-self-hosted.result == 'failure'
        run: |
          echo "❌ =================================="
          echo "Deployment Failed!"
          echo "=================================="
          echo ""
          echo "📍 Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Attempted by: ${{ github.actor }}"
          echo "📅 Failed at: $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          echo "🔍 Check logs:"
          echo "  docker-compose logs backend"
          echo "  docker-compose logs frontend"
          echo ""
          echo "⚠️  System has been rolled back to previous version"

      - name: Test Failed Notification
        if: needs.test.result == 'failure'
        run: |
          echo "⚠️  =================================="
          echo "Tests Failed - Deployment Skipped"
          echo "=================================="
          echo ""
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          echo ""
          echo "🔍 Please fix the failing tests before deploying"
